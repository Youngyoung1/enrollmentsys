spring:
  application:
    name: liveclass

  datasource:
    # 💡 배포 환경(리눅스)에서 에러가 나지 않도록 상대 경로(./)로 안전하게 설정합니다.
    url: jdbc:h2:file:./data/liveclassdb;AUTO_SERVER=TRUE;FILE_LOCK=SOCKET
    driver-class-name: org.h2.Driver
    username: sa
    password: your_secure_password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        show_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # 💡 부트 3.4.x 정적 자원 핸들러가 클라우드 리눅스 환경에서도 유실되지 않도록 보장합니다.
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

server:
  # 💡 Railway는 내부 시스템에서 환경 변수로 PORT를 주입하므로 이 설정을 반드시 유지해야 합니다.
  port: ${PORT:8080}
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: false # 💡 로컬과 서버 모두 화면이 뚫리도록 반드시 false 유지

logging:
  level:
    root: INFO
    com.example.liveclass: INFO
    org.springframework.web: INFO