spring:
  application:
    name: liveclass

  datasource:
    # Save database as a file inside the /data directory for Railway Volume persistence
    url: jdbc:h2:file:/data/liveclassdb;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE;FILE_LOCK=SOCKET
    driver-class-name: org.h2.Driver
    username: sa
    password: your_secure_password # ⚠️ Change this to a secure password!

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # 'update' ensures your tables are created automatically without deleting existing data on restart
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true

  # H2 Console configuration for remote access
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true # Allows you to access the console via your Railway public URL

# Springdoc OpenAPI (Swagger UI) Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    packages-to-scan: com.example.liveclass

# Logging configuration to monitor your application queries in Railway logs
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.results: TRACE