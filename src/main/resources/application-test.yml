spring:
  application:
    name: liveclass-test

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  datasource:
    # MVCC=true: H2 동시성 활성화
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MVCC=true;LOCK_TIMEOUT=10000
    username: sa
    password:
    driver-class-name: org.h2.Driver

logging:
  level:
    root: WARN
    com.example.liveclass: INFO
    org.hibernate.SQL: WARN